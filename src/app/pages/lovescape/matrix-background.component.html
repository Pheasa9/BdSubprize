<div class="matrix-bg">
  <ng-container *ngFor="let col of columns">
    <div
      class="matrix-col"
      [style.left]="col.left"
      [style.animationDuration]="col.duration + 's'"
      [style.animationDelay]="col.delay + 's'"
    >
      <div class="matrix-glyph-vertical">
        <ng-container *ngFor="let glyph of col.glyphs">
          <div>{{ glyph }}</div>
        </ng-container>
      </div>
    </div>
  </ng-container>
</div>
