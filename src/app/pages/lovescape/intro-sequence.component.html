<div class="intro-sequence">
  <!-- Regular text animations for steps 0-5 -->
  <div
    class="intro-sequence-text neon"
    [ngClass]="{'big': step <= 2, 'small': step > 2}"
    [style.fontFamily]="'Arial Black, Impact, sans-serif'"
    [style.letterSpacing]="'0.06em'"
    [@introStep]
    *ngIf="sequence[step] && !isFinalStep"
  >
    {{ sequence[step] }}
  </div>

  <!-- SOKYA stays visible, no leave animation -->
  <div
    class="intro-sequence-text neon small sokya-final"
    [style.fontFamily]="'Arial Black, Impact, sans-serif'"
    [style.letterSpacing]="'0.06em'"
    [@finalStep]
    *ngIf="isFinalStep"
  >
    {{ sequence[step] }}
  </div>
</div>
