<div class="app-shell">
  <audio #globalMusic loop preload="auto" (error)="onGlobalMusicError()"></audio>

  <input
    #musicPicker
    type="file"
    accept=".mp3,audio/mpeg,audio/*"
    hidden
    (change)="onMusicFilePicked($event)"
  />

  <button class="global-music-toggle" type="button" (click)="toggleGlobalMusic()">
    {{ musicPlaying ? 'Pause Music' : 'Play Music' }}
  </button>
  <div class="global-music-status" *ngIf="musicStatus">{{ musicStatus }}</div>

  <router-outlet></router-outlet>
</div>
