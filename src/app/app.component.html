<div class="app-shell">
  <video #globalMusic loop preload="auto" playsinline aria-hidden="true" style="display:none">
    <source src="assets/music/s.MP4" type="video/mp4" />
    <source src="assets/music/s.MP4" />
  </video>

  <button class="global-music-toggle" type="button" (click)="toggleGlobalMusic()">
    {{ musicPlaying ? 'Pause Music' : 'Play Music' }}
  </button>

  <router-outlet></router-outlet>
</div>
